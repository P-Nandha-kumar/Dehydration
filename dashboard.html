<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydraWatch - Real-Time Dashboard</title>
    <!-- Fonts: Orbitron & Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Floating particles background -->
    <canvas id="particleCanvas"></canvas>

    <div class="dashboard-container" id="appContainer">
        <!-- Header -->
        <header class="header-glow">
            <h1 class="orbitron-font">HydraWatch</h1>
            <div class="live-subtitle">
                <span class="pulse-dot"></span> LIVE
            </div>
        </header>

        <!-- Top Metrics Cards -->
        <section class="metrics-grid">
            <div class="glass-card">
                <div class="card-label">SWEAT LEVEL</div>
                <div class="card-value"><span id="sweatVal">64.0</span><span class="unit">%</span></div>
            </div>
            <div class="glass-card">
                <div class="card-label">BODY TEMPERATURE</div>
                <div class="card-value"><span id="tempVal">37.0</span><span class="unit">°C</span></div>
            </div>
            <div class="glass-card">
                <div class="card-label">HEART RATE</div>
                <div class="card-value"><span id="heartVal">80</span><span class="unit">bpm</span></div>
            </div>
            <div class="glass-card">
                <div class="card-label">SKIN IMPEDANCE</div>
                <div class="card-value"><span id="impedanceVal">450</span><span class="unit">Ω</span></div>
            </div>
        </section>

        <!-- Bottom Section -->
        <section class="bottom-grid">
            <!-- Status Section -->
            <div class="glass-card status-card">
                <i class="fa-solid fa-triangle-exclamation warning-icon hidden" id="warningIcon"></i>
                <div class="card-label">STATUS</div>
                <div class="status-value status-normal" id="statusVal">NORMAL</div>
            </div>

            <!-- Location Section -->
            <div class="glass-card location-card">
                <div class="card-label">LOCATION</div>
                <div class="loc-data">Lat: <span class="highlight">12.9716</span></div>
                <div class="loc-data">Lng: <span class="highlight">77.5946</span></div>
            </div>
        </section>
    </div>

    <!-- Critical Alert Banner -->
    <div class="critical-alert" id="criticalAlert">
        ⚠ CRITICAL: Severe Dehydration
    </div>

    <script src="script.js"></script>
</body>
</html>
